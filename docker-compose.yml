services:
  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-dev-master-key}
    volumes:
      - meilisearch_data:/meili_data

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: server -filer=true -master.volumeSizeLimitMB=30
    ports:
      - "9333:9333"
      - "7701:8080"
      - "8888:8888"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  bot:
    build: .
    command: poetry run watchfiles 'python -m melinoe.bot' melinoe/
    volumes:
      - .:/app
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_COPILOT_API_KEY: ${GITHUB_COPILOT_API_KEY:-}
      SEAWEEDFS_FILER_URL: http://seaweedfs:8888
      SEAWEEDFS_PUBLIC_URL: ${SEAWEEDFS_PUBLIC_URL:-http://localhost:8888}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-dev-master-key}
      REDIS_URL: redis://redis:6379
    depends_on:
      - meilisearch
      - seaweedfs
      - redis

  worker:
    build: .
    command: poetry run python -m arq melinoe.worker.WorkerSettings
    volumes:
      - .:/app
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_COPILOT_API_KEY: ${GITHUB_COPILOT_API_KEY:-}
      SEAWEEDFS_FILER_URL: http://seaweedfs:8888
      SEAWEEDFS_PUBLIC_URL: ${SEAWEEDFS_PUBLIC_URL:-http://localhost:8888}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-dev-master-key}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - meilisearch
      - seaweedfs

  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    ports:
      - "8931:8931"

  sonarqube:
    image: sonarqube:lts-community
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonardb:
        condition: service_healthy

  sonardb:
    image: postgres:15
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sonar" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meilisearch_data:
  redis_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonardb_data:
